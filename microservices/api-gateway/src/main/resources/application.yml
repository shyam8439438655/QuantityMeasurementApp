server:
  port: ${PORT:8080}
  address: 0.0.0.0

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      discovery:
        locator:
          enabled: false
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - http://localhost:4200
              - http://localhost:5173
              - http://localhost:3000
              - http://localhost:55299
              - https://qma-frontend.onrender.com
              - https://quantitymeasurementapp-frontend-s49x.onrender.com
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true

      routes:
        - id: auth-service-route
          uri: ${AUTH_SERVICE_URI:http://localhost:8081}
          predicates:
            - Path=/api/auth/**,/api/users/**

        - id: qma-service-route
          uri: ${QMA_SERVICE_URI:http://localhost:8082}
          predicates:
            - Path=/api/v1/quantities/**

        - id: history-service-route
          uri: ${HISTORY_SERVICE_URI:http://localhost:8083}
          predicates:
            - Path=/api/v1/history/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:5173,http://localhost:3000,http://localhost:52749,https://qma-frontend.onrender.com,https://quantitymeasurementapp-frontend-s49x.onrender.com}